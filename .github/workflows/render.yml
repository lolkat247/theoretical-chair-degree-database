name: Render LaTeX

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: latex/main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: proposal
          path: latex/main.pdf
